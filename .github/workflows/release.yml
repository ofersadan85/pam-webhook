name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      LLVM_CONFIG_PATH: /usr/bin/llvm-config-18
      LIBCLANG_PATH: /usr/lib/x86_64-linux-gnu/
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev clang

      - name: Link clang
        run: sudo ln -s /usr/lib/x86_64-linux-gnu/libclang-18.so.18 /usr/lib/x86_64-linux-gnu/libclang.so

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: |
          cargo test --all-features
          cargo test --no-default-features
          cargo test --no-default-features --features=logging
          cargo test --no-default-features --features=webhook

  release:
    needs: validate
    runs-on: ubuntu-latest
    env:
      LLVM_CONFIG_PATH: /usr/bin/llvm-config-18
      LIBCLANG_PATH: /usr/lib/x86_64-linux-gnu/
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev clang

      - name: Link clang
        run: sudo ln -s /usr/lib/x86_64-linux-gnu/libclang-18.so.18 /usr/lib/x86_64-linux-gnu/libclang.so

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build pam_logging.so
        run: |
          cargo build --release --no-default-features --features=logging
          cp target/release/libpam_webhook.so target/release/pam_logging.so

      - name: Build pam_webhook.so
        run: |
          cargo build --release --no-default-features --features=webhook
          cp target/release/libpam_webhook.so target/release/pam_webhook.so

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="main-r${GITHUB_RUN_NUMBER}"
          TITLE="main build #${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "$TITLE" \
            --notes "Automated release for run #${GITHUB_RUN_NUMBER} on main (${GITHUB_SHA})." \
            target/release/pam_webhook.so \
            target/release/pam_logging.so
